<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색창 구현하기</title>
    <style>
        div,form{
            border : 2px solid yellowgreen;
            box-sizing : border-box;
        }
        #header_2{
            width: 650px;
            height: 160px;
        }
        #header_2{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #search-form{
            width: 85%;
            height: 44%;
            display: flex;
            padding : 4px;
            background-color: antiquewhite;
            border-radius: 17px;
        }
        #search-text{
            flex : 7.5;
        }
        #search-btn{
            flex : 1.5;

        }
        
        #search-text>input{
            width: 100%;
            height :100%;
            box-sizing : border-box;
            padding : 0 15px;
            color : #252525;
            border-radius :7px;

        

            &:focus{
                outline : rgb(107, 109, 110);
            }
        }
        #sarch-btn>button{
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background-color: #db6060;
            color: antiquewhite;
            font-weight: 600;

            &:hover{
                background-color: antiquewhite;
                color: #252525;
            }

        }





    </style>


</head>
<body>
        <div id ="header_2">

            <form action="search" method="get" id="search-form">
                <div id="search-text">
                    <input type="text" name="qurey" placeholder="검색어를 입력" />
                </div>
                <div id="search-btn">

                </div>
                <div id="search-btn">
                    <button type="sumit">검색하기</button>
                </div>
            </form>  

        </div>
           
            
        


</body>
</html>
