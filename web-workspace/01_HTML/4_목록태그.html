<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록을 만들어보기</title>
</head>
<body>
    <!--
    
        <li> : 기본적인 목록을 만드는 태그

    -->
    우리 공부한 목록 :
    <li>Java</li>
    <li>SQL</li>
    <li>JDBC</li>
    <li>MyBatis</li>


<h3>u1 : 순서가 없는 목록을 사용할 때 쓰는 태그</h3>
<u1>

   <li>HTML</li>
   <li>CSS</li>
   <li>JavaScript</li>
   <li>React</li>

</u1>
<!-- bullet기호 : 채워진원, 빈원, 네모네모, 내가쓰고싶은거-->

<h3>o1 : 순서가 있는 목록을 사용할 때 쓰는 태그</h3>

<o1 start="10" type="I">
    <li>목록</li>
    <li>목록</li>
    <li>목록</li>

</o1>
<br><br><br><br><br><br><br><br><br><br>
</body>
</html>
