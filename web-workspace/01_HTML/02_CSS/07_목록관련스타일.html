<!DOCTYPE html>
<html lang="en">
<head>
    <title>목록만드는 작업을 한다고 가정~</title>

<style>
    #ul1{
        list-style: none; /* circle =>속이 빈 동그라미*/
        padding : 0;
        margin : 0;
    }

    #ul2{
        list-style-image : url("http://yeoek99.jpg3.kr/sabangnet/shoes_20250729_02S_680_01.jpg");
        list-style-position : inside;
    }
</style>


</head>
<body>
    



<h1>리스트~~~~</h1>

<h3>list-style-type : 불릿기호 변경</h3>

<pre>
    ul
        선택자{
            list-style : disc / circle / squre / none;
        }

    ol
    선택자{
        list-style : decimal(십진수); lower-roman, upper-roman=>로마숫자
                    lower-alpha, upper-alpha =>알파벳
    }
</pre>
<ul id="ul1">
    <li>1</li>
    <li>2</li>
    <li>3</li>
</ul>

<ul id="ul2">
    <li>4</li>
    <li>5</li>
    <li>6</li>
</ul>




</body>
</html>
