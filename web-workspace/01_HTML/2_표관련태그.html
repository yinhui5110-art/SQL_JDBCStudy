<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2_표만들기~</title>
    <style>
        table{
            border : 1px solid red;
        }

    </style>
</head>
<body>
    <!--
    표(table) : row + cell로 구성된다
    많은 데이터를 정리해서 표현하고자 할 때 사용

    표를 구성하는 요소 : <table>, <tr>, <th>, <td>
        +<thead>, <tbody>, <tfoot>
    
    table : 표를 하나 만들어주는 요소
    tr : 한 행을 나타내는 요소
    td : 일반 셀을 나타내는 요소
    
    th : 열의 제목셀을 나타내는 요소

    -->

    <table>
        <tr>
            <th colspan="2">제목</th> /*colspan="2" 가로로 두칸 합쳐진다는 말*/
            <th>작성자</th>
            <th>작성일</th>
            <th>조회수</th>
            <th>좋아요</th>
        </tr>
        <tr>
            <td>1212121212</td>
            <td>버버리 토트백</td>
            <td>dfdfdfd1999</td>
            <td>12:22</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>151515151</td>
            <td>여성백팩</td>
            <td>그랑블루1196</td>
            <td>12:21</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>164544545</td>
            <td>이세이미야케 미니백</td>
            <td>ahkunamatat</td>
            <td>12:20</td>
            <td>2</td>
            <td>0</td>
        </tr>
    </table>

 <br><br><br><br><br><br><br><br><br><br>

</body>
</html>
