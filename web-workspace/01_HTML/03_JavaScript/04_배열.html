     <script>
        function addEl(){
            const array1 =[];             //빈 배열을 선언하는 방법!
            const array2 = new Array(3);  // 생성자 함수라고 한다

            console.log(array1);
            console.log(array2);

            //배열 추가할 때
            //자바였을때는
            array1[0] ='당근';
            array1.push('사과');
            array1.unshift('망고'); //가장 앞쪽에 추가가 된다
            array1.push('수박');
            array1.unshift('복숭아');

            const num = parseInt(Math.random() * array1.length);
            alert(`오늘의 점심 메뉴는 ${array1[num]}입니다 축하빵빵~`);

            
            alert(array1.pop());   /* 가장 마지막에 있는 것을 뽑는것*/
            alert(array1.shift()); /*가장 앞에 있는*/

            document.querySelector('#area2').innerHTML = array1;
            



        }

        <div id="area4" class="area small"></div>
        <button onclick="sort();">정렬</button>

        <script>
            function sort(){
                const arr = ['Bnana', 'Lemon', 'Apple', '수박', '망고','香瓜'];

                const area = document.querySelector('#area4');
                area.innerHTML = `${arr}<br>`;
                arr.sort();
                area.innerHTML += `${arr}<br>`;
                arr.reverse();
                area.innerHTML += `${arr}<br>`;

                // slice(begin, end) : 배열의 요소를 추출해주는

                area.innerHTML +=`${arr.slice(4, 6)}<br>`;
                area.innerHTML += `${arr.splice(1,1, '수박박')}<br>`; //추가할때
                area.innerHTML +=`${arr}<br>`;
                area.innerHTML += `${arr.splice(3,2)}<br>`;
                area.innerHTML += `${arr}<br>`; //삭제하고 싶을때

            }
        </script>

        <h4>join() :  배열에 담긴 요소를 하나의 string타입으로 합쳐주는 메소드</h4>

        <!-- #area5.area.small-->
        <div id="area5" class="area small"></div>
        <button onclick="join();">버튼</button>

        <script>
            function join(){

                const area = document.querySelector('#area5');

                const arr = ['홍길동', '고길동', '짱구', '도라에몽', '보노보노'];

                area.innerHTML =arr;
                // 츨력형식
                // 이름 : 홍길동
                // 이름 : 고길동

                //map를 사용했을때
                const names = arr.map(function(name){
                    return '이름 : ' + name +'<br>';
                });
                console.log(names);
                area.innerHTML = names.join(" ");

                const names2 = arr.map(n => `이름 : ${n}<br>`).join('');
                area.innerHTML = names2;

                //객체는 key~value형태로 값을 관리한다
                const obj ={
                    과일 : "사과"
                };

                area.innerHTML += obj.toString();
                //println(참조자료형.toSting())
                area.innerHTML += arr.toString();

            }





        </script>
