    <script>
            let page = 1;
            function ne(){
                page++;
                requestCafe(page);
            };
            
           
            function requestCafe(pageNo){
            if(!pageNo) pageNo = 1;

             $.ajax({
                url : 'https://openapi.gg.go.kr/Genrestrtcate?Type=json&pSize=10&KEY=985455fd7eae4fbfbb4ff10f20e5d2ac&pIndex='+ pageNo,
                dataType : 'json',
                success : result => {
                    console.log(result.Genrestrtcate[1].row);
                    const cafes = result.Genrestrtcate[1].row;

                    //console.log(cafe[0].BIZPLC_NM);
                    //console.log(cafe[0].SIGUN_NM);
                   // console.log(cafe[0].REFINE_ROADNM_ADDR);
                    /*
                    const name = cafes[0].BIZPLC_NM;
                    const sigunName = cafes[0].SIGUN_NM;
                    const address = cafes[0].REFINE_ROADNM_ADDR;
                    const el = `<tr> 
                                    <th>${name}</th>
                                    <th>${sigunName}</th>
                                    <th>${address}</th>
                                </tr>`;
                    */
                                
                                    
                         
                    const el = cafes.map(e => `<tr>
                                                <th>${e.SIGUN_NM}</th>
                                                <th>${e.BIZPLC_NM}</th>
                                                <th>${e.REFINE_ROADNM_ADDR}</th>
                                                </tr>`).join('');
                     document.querySelector('tbody').innerHTML = el;                            
                }
                
            }); 
        }

        $(function(){
            requestCafe();
        });
    </script>

<button type="button" id="show" class="btn btn-primary">Primary</button>
<button type="button"  id="hide" class="btn btn-secondary">Secondary</button>
<button type="button" id="toggle" class="btn btn-success">Success</button>
<button type="button" id="fadeIn" class="btn btn-danger">Danger</button>
<button type="button" id="fadeOut" class="btn btn-warning">Warning</button>
<button type="button" id="fadeToggle" class="btn btn-info">Info</button>

<img src="" alt=""
width="800"
height="160"
id="andar">

<script>
    $(function(){
        $('#hide').click(function(){
            $('#andar').hide(5000);
        });
        $('#show').click(function(){
            $('#andar').show(3000)
        });
        $('#toggle').click(function(){
             $('#andar').toggle(500);
        });
        $('#fadeout').click(function(){
            $('#andar').fadeOut(3000);
        })
        $('#fadeIn').click(function(){
                $('#andar').fadeIn(3000);
        });
        $('#fadeToggle').click(function(){
                $('andar').fadeToggle(1000);
        });

    });
</script>

    <h4>* 글자수세기 예제</h4>

    <div style="border: 1px solid rgb(77, 76, 76);">
        <br>
        40자 이내로 입력하세요 . <br>
        <hr>
        <textarea   id="content"
                    cols="40"
                    rows="10"
                    style="resize:none;"
                    maxlength="40"></textarea>
         <hr>
         <br>
         <span id="count">0</span>/40           
        <br>
    </div>
    <script>
        $(function(){
            $('#content').keyup(e => {
                console.log(e.target.value.length);
                $('#count').html(e.target.value.length);
            })

        });
    </script>
    
    <hr>

  <button onclick="letsGo();">곤드레만드레밥보기</button>
  <div style="padding :100px;"  id="busan">
  </div>

<script>
    let pageNo = 1;
    function letsGo(){
        $.ajax({
            url:'https://apis.data.go.kr/6260000/FoodService/getFoodKr?serviceKey=dba5f5002bfa00eebfd01fac050de7b49f7c4489b8f3ccd781209169097a1cab&pageNo=1&numOfRows=10&resultType=json&pageNo= 1' + pageNo++,
            dataType : 'json',
            success : e =>{
               // console.log(e.getFoodKr.item);
                const items = e.getFoodKr.item;
                console.log(items);

                const el = items.map(e => ` 
                                            <div style="display : flex; width: 100%; height : 160px;
                                                                    margin-bottom: 10px;">
                                                <div style="flex:2; padding: 7px;">
                                                    <img src ="${e.MAIN_IMG_NORMAL}"
                                                            width="100%"
                                                            height="100%"/>
                                                    </div>
                                                    <div style="flex:8; padding: 7px;">
                                                        <h4>기계명 :${e.MAIN_TITLE}</h4>
                                                        <p>대표메뉴 :${e.RPRSNTV_MENU}</p>
                                                        <div>
                                                            ${e.ITEMCNTNTS}
                                                            </div>
                                                        </div>
                                                        </div>
                                                        `).join('');
                    document.querySelector('#busan').innerHTML =el;                                    
                                                
            }
        });

    }


</script>

<!--
    jQuery :  자바스크립트 라이브러리(모음집)

    요소 선택하는 방법 :  $('CSS선택자')
    Content영역 변경하는 법 : html()
    Sytle 변경하는 법 :  css()
    EventHandler 다는법(click) : click()
    Input요소 value속성 접근하는법 : val()
-->
