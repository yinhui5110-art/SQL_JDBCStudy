    <h3>아이디 선택자</h3>

    <p>현재 HTML문서에서 고유한 아이디 속성값을 가진 요소 단 하나만 선택</p>

    <!-- h3#id${id$}*2 -->
     <h3 id="id1">id1</h3>
     <h3 id="id2">id2</h3>

    <script>
        $(function(){

            const h3El = document.querySelector('#id1');

            h3El.innerHTML = '컨텐트';
            h3El.style.color = 'green';

            $('#id2').html('컨텐트').css('color' , 'green');
            // .html : innerHTML속성과 관련된 기능을 수행하는 메소드
              
        });
    </script>
